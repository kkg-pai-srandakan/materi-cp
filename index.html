<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasbor Perangkat Pembelajaran PAI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0d6b3d;
            --primary-dark: #064e28;
            --primary-light: #10b981;
            --accent: #059669;
            --bg-light: #f0fdf4;
            --bg-sidebar: #ffffff;
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --text-light: #94a3b8;
            --border-color: #dcfce7;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
            --shadow-xl: 0 20px 50px rgba(0,0,0,0.12);
            --radius-sm: 8px;
            --radius: 14px;
            --radius-lg: 20px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 320px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background-color: var(--bg-light);
            color: var(--text-dark);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 40%, #0f7a44 100%);
            color: white;
            padding: 1rem 1.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-lg);
            z-index: 100;
            position: relative;
            gap: 1rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            flex: 1;
            min-width: 0;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.4rem 0.5rem;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            flex-shrink: 0;
            line-height: 1;
        }
        .menu-toggle:hover {
            background: rgba(255,255,255,0.15);
        }
        .menu-toggle:active {
            background: rgba(255,255,255,0.25);
        }

        .header-text {
            min-width: 0;
        }
        .header-text h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .header-text .subtitle {
            font-size: 0.8rem;
            opacity: 0.8;
            font-weight: 500;
            letter-spacing: 0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-icon {
            background: rgba(255,255,255,0.12);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .header-icon i {
            font-size: 1.5rem;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 90;
            transition: opacity var(--transition);
            opacity: 0;
            pointer-events: none;
        }
        .sidebar-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar {
            width: var(--sidebar-width);
            max-width: 85vw;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 95;
            flex-shrink: 0;
            transition: transform var(--transition), box-shadow var(--transition);
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .sidebar-logo-area {
            display: none;
            padding: 1rem 1.5rem 0.6rem;
            align-items: center;
            gap: 0.7rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 0.2rem;
        }
        .sidebar-logo-area i {
            font-size: 1.4rem;
            color: var(--primary);
        }
        .sidebar-logo-area span {
            font-weight: 700;
            color: var(--primary-dark);
            font-size: 0.95rem;
            letter-spacing: -0.2px;
        }

        /* --- Kategori (padding dikurangi) --- */
        .category-title {
            padding: 0.9rem 1.5rem 0.3rem;
            font-size: 0.7rem;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .category-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
            border-radius: 1px;
        }

        /* --- Menu item (padding & gap dikurangi) --- */
        .nav-item {
            padding: 0.5rem 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid transparent;
            color: var(--text-dark);
            transition: all var(--transition);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: -0.1px;
            position: relative;
            margin: 1px 0;
            border-radius: 0 30px 30px 0;
            margin-right: 10px;
        }

        .nav-item:hover {
            background-color: #f0fdf4;
            color: var(--primary);
            border-left-color: #a7f3d0;
        }

        .nav-item.active {
            background: linear-gradient(90deg, #ecfdf5 0%, #f0fdf4 100%);
            border-left-color: var(--primary-light);
            color: var(--primary-dark);
            font-weight: 700;
            box-shadow: var(--shadow-sm);
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 5px;
            bottom: 5px;
            width: 3px;
            background: var(--primary-light);
            border-radius: 0 4px 4px 0;
        }

        .nav-item i {
            width: 24px;
            height: 24px;
            text-align: center;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: var(--transition);
            flex-shrink: 0;
            background: #f1f5f9;
            color: var(--text-gray);
        }
        .nav-item.active i {
            background: #d1fae5;
            color: var(--primary);
        }
        .nav-item:hover i {
            background: #d1fae5;
            color: var(--accent);
        }

        .main-content {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            min-width: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #f1f5f9;
        }

        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-gray);
            text-align: center;
            padding: 2rem;
            background: radial-gradient(ellipse at center, #f8fafc 0%, #fff 70%);
        }
        .placeholder .icon-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #f0fdf4;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.2rem;
            box-shadow: var(--shadow-md);
        }
        .placeholder .icon-circle i {
            font-size: 2.6rem;
            color: #86efac;
        }
        .placeholder h2 {
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.4rem;
            font-size: 1.3rem;
            letter-spacing: -0.3px;
        }
        .placeholder p {
            color: var(--text-light);
            font-size: 0.9rem;
            max-width: 340px;
            line-height: 1.5;
        }

        footer {
            background: var(--primary-dark);
            text-align: center;
            padding: 0.8rem 1rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.75);
            font-weight: 500;
            letter-spacing: 0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 1024px) {
            :root {
                --sidebar-width: 280px;
            }
            .nav-item {
                padding: 0.45rem 1.2rem;
                font-size: 0.8rem;
                gap: 8px;
                margin-right: 8px;
            }
            .nav-item i {
                width: 22px;
                height: 22px;
                font-size: 0.8rem;
            }
            .category-title {
                padding: 0.7rem 1.2rem 0.2rem;
                font-size: 0.65rem;
                letter-spacing: 1.2px;
            }
            header {
                padding: 0.85rem 1.3rem;
            }
            .header-text h1 {
                font-size: 1.1rem;
            }
            .header-icon {
                width: 40px;
                height: 40px;
            }
            .header-icon i {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
            .sidebar-overlay {
                display: block;
            }
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 300px;
                max-width: 82vw;
                transform: translateX(-105%);
                box-shadow: var(--shadow-xl);
                border-right: 1px solid var(--border-color);
                border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
                z-index: 95;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-logo-area {
                display: flex;
            }
            .category-title:first-of-type {
                padding-top: 0.5rem;
            }
            header {
                padding: 0.7rem 1rem;
                gap: 0.6rem;
            }
            .header-text h1 {
                font-size: 1rem;
            }
            .header-text .subtitle {
                font-size: 0.7rem;
            }
            .header-icon {
                width: 36px;
                height: 36px;
            }
            .header-icon i {
                font-size: 1.1rem;
            }
            .placeholder .icon-circle {
                width: 75px;
                height: 75px;
            }
            .placeholder .icon-circle i {
                font-size: 2rem;
            }
            .placeholder h2 {
                font-size: 1.1rem;
            }
            .placeholder p {
                font-size: 0.8rem;
                max-width: 260px;
            }
        }

        @media (max-width: 400px) {
            .sidebar {
                width: 280px;
                max-width: 88vw;
                border-radius: 0 var(--radius) var(--radius) 0;
            }
            .nav-item {
                padding: 0.4rem 1rem;
                font-size: 0.75rem;
                gap: 6px;
                margin-right: 6px;
            }
            .nav-item i {
                width: 20px;
                height: 20px;
                font-size: 0.75rem;
            }
            .category-title {
                padding: 0.6rem 1rem 0.2rem;
            }
            header {
                padding: 0.6rem 0.8rem;
            }
            .header-text h1 {
                font-size: 0.9rem;
            }
            .header-text .subtitle {
                font-size: 0.65rem;
            }
            footer {
                font-size: 0.7rem;
                padding: 0.6rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="menu-toggle" id="menuToggle" aria-label="Buka menu" title="Menu">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="header-text">
                <h1>Penyusunan Perangkat Pembelajaran</h1>
                <div class="subtitle">KKG PAI Kapanewon Srandakan</div>
            </div>
        </div>
        <div class="header-icon">
            <i class="fa-solid fa-mosque"></i>
        </div>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="container">
        <aside class="sidebar" id="sidebarMenu">
            <div class="sidebar-logo-area">
                <i class="fa-solid fa-book-open-reader"></i>
                <span>Menu Navigasi</span>
            </div>
        </aside>

        <main class="main-content">
            <iframe id="documentViewer" src="about:blank" title="Penampil Dokumen"
                sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-top-navigation allow-fullscreen"
                loading="lazy">
            </iframe>

            <div class="placeholder" id="welcomeScreen">
                <div class="icon-circle">
                    <i class="fa-solid fa-folder-open"></i>
                </div>
                <h2>Pilih Materi di Sidebar</h2>
                <p>Materi presentasi atau dokumen referensi PDF akan ditampilkan di area ini.</p>
            </div>
        </main>
    </div>

    <footer>
        Disusun oleh: Ardika Riski Rahmawan &bull; KKG PAI Kapanewon Srandakan
    </footer>

    <script>
        (function() {
            const menuData = [{
                category: "Materi Sosialisasi",
                items: [
                    { title: "Presentasi Perangkat PAI", icon: "fa-person-chalkboard", url: "slide-presentasi.html" }
                ]
            }, {
                category: "Contoh Referensi",
                items: [
                    { title: "Analisis Kalender Pendidikan", icon: "fa-calendar-alt", url: "referensi/analisis-kaldik.pdf" },
                    { title: "Capaian Pembelajaran", icon: "fa-bullseye", url: "referensi/capaian-pembelajaran.pdf" },
                    { title: "Alur Tujuan Pembelajaran", icon: "fa-sitemap", url: "referensi/alur-tujuan-pembelajaran.pdf" },
                    { title: "Program Tahunan", icon: "fa-calendar-check", url: "referensi/program-tahunan.pdf" },
                    { title: "Program Semester", icon: "fa-calendar-week", url: "referensi/program-semester.pdf" },
                    { title: "RPP / Modul Ajar", icon: "fa-chalkboard-teacher", url: "referensi/modul-ajar.pdf" },
                    { title: "KKTP", icon: "fa-check-double", url: "referensi/kktp.pdf" },
                    { title: "Program Keagamaan", icon: "fa-mosque", url: "referensi/program-keagamaan.pdf" },
                    { title: "Program Ekstrakurikuler", icon: "fa-users", url: "referensi/program-ekstrakurikuler.pdf" },
                    { title: "Program Perbaikan dan Pengayaan", icon: "fa-hands-helping", url: "referensi/program-perbaikan-pengayaan.pdf" }
                ]
            }];

            const sidebarElement = document.getElementById('sidebarMenu');
            const viewerElement = document.getElementById('documentViewer');
            const welcomeScreen = document.getElementById('welcomeScreen');
            const menuToggle = document.getElementById('menuToggle');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            let activeItemElement = null;

            function showViewer(url) {
                welcomeScreen.style.display = 'none';
                viewerElement.style.display = 'block';
                viewerElement.src = url;
            }

            function renderSidebar() {
                const logoArea = sidebarElement.querySelector('.sidebar-logo-area');
                sidebarElement.innerHTML = '';
                if (logoArea) {
                    sidebarElement.appendChild(logoArea);
                } else {
                    const newLogoArea = document.createElement('div');
                    newLogoArea.className = 'sidebar-logo-area';
                    newLogoArea.innerHTML = '<i class="fa-solid fa-book-open-reader"></i><span>Menu Navigasi</span>';
                    sidebarElement.appendChild(newLogoArea);
                }

                menuData.forEach((section) => {
                    const categoryTitle = document.createElement('div');
                    categoryTitle.className = 'category-title';
                    categoryTitle.textContent = section.category;
                    sidebarElement.appendChild(categoryTitle);

                    section.items.forEach((item) => {
                        const menuItem = document.createElement('div');
                        menuItem.className = 'nav-item';
                        menuItem.innerHTML = `<i class="fa-solid ${item.icon}"></i> <span>${item.title}</span>`;
                        menuItem.setAttribute('role', 'button');
                        menuItem.setAttribute('tabindex', '0');
                        menuItem.setAttribute('aria-label', `Buka ${item.title}`);

                        menuItem.addEventListener('click', () => {
                            if (activeItemElement) activeItemElement.classList.remove('active');
                            menuItem.classList.add('active');
                            activeItemElement = menuItem;
                            showViewer(item.url);
                            closeSidebar();
                        });

                        menuItem.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter' || e.key === ' ') {
                                e.preventDefault();
                                menuItem.click();
                            }
                        });

                        sidebarElement.appendChild(menuItem);
                    });
                });

                viewerElement.style.display = 'none';
                welcomeScreen.style.display = 'flex';
            }

            function openSidebar() {
                sidebarElement.classList.add('open');
                sidebarOverlay.classList.add('visible');
                document.body.style.overflow = 'hidden';
                setTimeout(() => {
                    const focusTarget = sidebarElement.querySelector('.nav-item.active') || sidebarElement.querySelector('.nav-item');
                    if (focusTarget) focusTarget.focus();
                }, 150);
            }

            function closeSidebar() {
                sidebarElement.classList.remove('open');
                sidebarOverlay.classList.remove('visible');
                document.body.style.overflow = '';
                if (menuToggle) menuToggle.focus();
            }

            function toggleSidebar() {
                if (sidebarElement.classList.contains('open')) {
                    closeSidebar();
                } else {
                    openSidebar();
                }
            }

            menuToggle.addEventListener('click', toggleSidebar);
            sidebarOverlay.addEventListener('click', closeSidebar);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && sidebarElement.classList.contains('open')) {
                    closeSidebar();
                }
            });
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768 && sidebarElement.classList.contains('open')) {
                    closeSidebar();
                }
            });

            renderSidebar();
        })();
    </script>
</body>
</html>
