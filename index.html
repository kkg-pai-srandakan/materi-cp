<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasbor Perangkat Pembelajaran PAI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0e6b42;
            --primary-dark: #0a4a2e;
            --primary-soft: #e7f4ec;
            --gold: #a9741b;
            --gold-soft: #f6ecd9;
            --bg-page: #f7f9f8;
            --bg-sidebar: #ffffff;
            --text-dark: #1e293b;
            --text-gray: #64748b;
            --text-light: #94a3b8;
            --border-color: #e4e9e6;
            --shadow-sm: 0 1px 2px rgba(15,23,20,0.05);
            --shadow-md: 0 2px 10px rgba(15,23,20,0.06);
            --shadow-lg: 0 10px 28px rgba(15,23,20,0.10);
            --radius-sm: 6px;
            --radius: 10px;
            --radius-lg: 16px;
            --transition: 0.2s ease;
            --sidebar-width: 232px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background-color: var(--bg-page);
            color: var(--text-dark);
            overflow: hidden;
        }

        header {
            background-color: var(--primary-dark);
            background-image: radial-gradient(circle at 6px 6px, rgba(255,255,255,0.055) 1.4px, transparent 1.5px);
            background-size: 22px 22px;
            color: white;
            padding: 0.5rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-md);
            z-index: 100;
            position: relative;
            gap: 0.7rem;
            min-height: 44px;
            border-bottom: 2px solid var(--gold);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex: 1;
            min-width: 0;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.25rem 0.35rem;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            flex-shrink: 0;
            line-height: 1;
        }
        .menu-toggle:hover,
        .menu-toggle:focus-visible {
            background-color: rgba(255,255,255,0.14);
        }
        .menu-toggle:active {
            background-color: rgba(255,255,255,0.22);
        }

        .header-text {
            min-width: 0;
        }
        .header-text h1 {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.2px;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .header-text .subtitle {
            font-size: 0.68rem;
            color: #cfe8d9;
            font-weight: 600;
            letter-spacing: 0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(10,20,15,0.45);
            z-index: 90;
            transition: opacity var(--transition);
            opacity: 0;
            pointer-events: none;
        }
        .sidebar-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar {
            width: var(--sidebar-width);
            max-width: 80vw;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 95;
            flex-shrink: 0;
            transition: transform var(--transition), box-shadow var(--transition);
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 0.4rem;
        }

        .sidebar-logo-area {
            display: none;
            padding: 0.65rem 1.1rem 0.4rem;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 0.1rem;
        }
        .sidebar-logo-area i {
            font-size: 1.1rem;
            color: var(--primary);
        }
        .sidebar-logo-area span {
            font-weight: 700;
            color: var(--primary-dark);
            font-size: 0.82rem;
            letter-spacing: -0.1px;
        }

        .category-title {
            padding: 0.55rem 1.1rem 0.15rem;
            font-size: 0.63rem;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1.1px;
            font-weight: 700;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .category-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--border-color);
            border-radius: 1px;
        }

        .nav-item {
            padding: 0.38rem 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 3px solid transparent;
            color: var(--text-dark);
            transition: var(--transition);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: -0.1px;
            position: relative;
            margin: 1px 0;
            border-radius: 0 20px 20px 0;
            margin-right: 8px;
        }

        .nav-item:hover {
            background-color: var(--primary-soft);
            color: var(--primary);
            border-left-color: #a7d9bb;
        }

        .nav-item.active {
            background-color: var(--primary-soft);
            border-left-color: var(--gold);
            color: var(--primary-dark);
            font-weight: 700;
        }

        .nav-item i {
            width: 19px;
            height: 19px;
            text-align: center;
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: var(--transition);
            flex-shrink: 0;
            background-color: #eef2f0;
            color: var(--text-gray);
        }
        .nav-item.active i {
            background-color: var(--gold-soft);
            color: var(--gold);
        }
        .nav-item:hover i {
            background-color: #ddf0e3;
            color: var(--primary);
        }

        .main-content {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            min-width: 0;
        }

        .content-toolbar {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 0.6rem;
            padding: 0.4rem 0.85rem;
            background-color: #ffffff;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            min-height: 38px;
        }
        .content-toolbar.visible {
            display: flex;
        }
        .content-toolbar .toolbar-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 7px;
            min-width: 0;
        }
        .content-toolbar .toolbar-title i {
            color: var(--primary);
            font-size: 0.78rem;
            flex-shrink: 0;
        }
        .toolbar-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .toolbar-btn {
            border: 1px solid var(--border-color);
            background-color: #ffffff;
            color: var(--text-gray);
            width: 28px;
            height: 28px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.78rem;
            transition: var(--transition);
        }
        .toolbar-btn:hover,
        .toolbar-btn:focus-visible {
            background-color: var(--primary-soft);
            border-color: #bfe0cc;
            color: var(--primary);
        }

        .viewer-wrap {
            position: relative;
            flex: 1;
            min-height: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #f1f5f3;
            display: block;
        }

        .viewer-message {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background-color: #f1f5f3;
            flex-direction: column;
            gap: 0.6rem;
            z-index: 2;
        }
        .viewer-message.visible {
            display: flex;
        }
        .viewer-message i {
            font-size: 2.5rem;
            color: #cbd5e1;
        }
        .viewer-message .msg-text {
            font-size: 0.85rem;
            color: var(--text-gray);
            font-weight: 600;
            text-align: center;
            padding: 0 1rem;
        }

        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-gray);
            text-align: center;
            padding: 2rem;
            background-color: #fbfdfc;
        }
        .placeholder .icon-circle {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background-color: var(--primary-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.85rem;
            box-shadow: var(--shadow-sm);
        }
        .placeholder .icon-circle i {
            font-size: 1.7rem;
            color: var(--primary);
        }
        .placeholder h2 {
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.25rem;
            font-size: 1.05rem;
            letter-spacing: -0.2px;
        }
        .placeholder p {
            color: var(--text-light);
            font-size: 0.78rem;
            max-width: 300px;
            line-height: 1.5;
        }

        footer {
            background-color: var(--primary-dark);
            text-align: center;
            padding: 0.42rem 1rem;
            font-size: 0.68rem;
            color: rgba(255,255,255,0.78);
            font-weight: 500;
            letter-spacing: 0.1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        @media (max-width: 1024px) {
            :root { --sidebar-width: 216px; }
            .nav-item { padding: 0.34rem 0.9rem; font-size: 0.74rem; gap: 6px; margin-right: 6px; }
            .nav-item i { width: 17px; height: 17px; font-size: 0.68rem; }
            .category-title { padding: 0.5rem 0.9rem 0.1rem; font-size: 0.6rem; }
            header { padding: 0.45rem 1.1rem; }
            .header-text h1 { font-size: 0.98rem; }
        }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar-overlay { display: block; }
            .sidebar {
                position: fixed; top: 0; left: 0; bottom: 0;
                width: 250px; max-width: 80vw;
                transform: translateX(-105%);
                box-shadow: var(--shadow-lg);
                border-right: 1px solid var(--border-color);
                border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
                z-index: 95;
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-logo-area { display: flex; }
            .category-title:first-of-type { padding-top: 0.4rem; }
            header { padding: 0.45rem 0.75rem; gap: 0.5rem; }
            .header-text h1 { font-size: 0.9rem; }
            .header-text .subtitle { font-size: 0.63rem; }
            .content-toolbar { padding: 0.35rem 0.6rem; }
            .content-toolbar .toolbar-title { font-size: 0.74rem; }
            .placeholder .icon-circle { width: 56px; height: 56px; }
            .placeholder .icon-circle i { font-size: 1.4rem; }
            .placeholder h2 { font-size: 0.95rem; }
            .placeholder p { font-size: 0.72rem; max-width: 240px; }
        }

        @media (max-width: 400px) {
            .sidebar { width: 230px; max-width: 85vw; }
            .nav-item { padding: 0.32rem 0.75rem; font-size: 0.7rem; gap: 5px; margin-right: 4px; }
            .nav-item i { width: 16px; height: 16px; font-size: 0.64rem; }
            header { padding: 0.38rem 0.55rem; }
            .header-text h1 { font-size: 0.82rem; }
            .header-text .subtitle { font-size: 0.58rem; }
            .toolbar-btn { width: 25px; height: 25px; }
            footer { font-size: 0.63rem; padding: 0.4rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="menu-toggle" id="menuToggle" aria-label="Buka menu" title="Menu">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="header-text">
                <h1>Penyusunan Perangkat Pembelajaran</h1>
                <div class="subtitle">KKG PAI Kapanewon Srandakan</div>
            </div>
        </div>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="container">
        <aside class="sidebar" id="sidebarMenu">
            <div class="sidebar-logo-area">
                <i class="fa-solid fa-book-open-reader"></i>
                <span>Menu Navigasi</span>
            </div>
        </aside>

        <main class="main-content">
            <div class="content-toolbar" id="contentToolbar">
                <div class="toolbar-title">
                    <i class="fa-solid fa-file-lines" id="toolbarIcon"></i>
                    <span id="toolbarTitleText">Materi</span>
                </div>
                <div class="toolbar-actions">
                    <button class="toolbar-btn" id="btnOpenNewTab" title="Buka di tab baru">
                        <i class="fa-solid fa-up-right-from-square"></i>
                    </button>
                    <button class="toolbar-btn" id="btnFullscreen" title="Layar penuh">
                        <i class="fa-solid fa-expand"></i>
                    </button>
                </div>
            </div>

            <div class="viewer-wrap">
                <div class="viewer-message" id="viewerError">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span class="msg-text">File tidak ditemukan atau tidak dapat diakses.</span>
                </div>
                <iframe id="documentViewer" src="about:blank" title="Penampil Dokumen"
                    allow="fullscreen"
                    loading="lazy"
                    style="display:none;">
                </iframe>

                <div class="placeholder" id="welcomeScreen">
                    <div class="icon-circle">
                        <i class="fa-solid fa-folder-open"></i>
                    </div>
                    <h2>Pilih Materi di Sidebar</h2>
                    <p>Materi presentasi atau dokumen referensi PDF akan ditampilkan di area ini.</p>
                </div>
            </div>
        </main>
    </div>

    <footer>
        Disusun oleh: Ardika Riski Rahmawan &bull; KKG PAI Kapanewon Srandakan
    </footer>

    <script>
        (function() {
            // Data menu (KOMA SUDAH DIPERBAIKI)
            const menuData = [{
                category: "Materi Sosialisasi",
                items: [
                    { title: "Analisis Kebijakan CP BKPDM 020 Tahun 2026", icon: "fa-scale-balanced", url: "analisis-kebijakan-cp.html", type: "slide" },
                    { title: "Presentasi Perangkat PAI", icon: "fa-person-chalkboard", url: "slide-presentasi.html", type: "slide" }
                ]
            }, {
                category: "Contoh Referensi",
                items: [
                    { title: "Analisis Kalender Pendidikan", icon: "fa-calendar-alt", url: "referensi/analisis-kaldik.pdf", type: "pdf" },
                    { title: "Capaian Pembelajaran", icon: "fa-bullseye", url: "referensi/capaian-pembelajaran.pdf", type: "pdf" },
                    { title: "Alur Tujuan Pembelajaran", icon: "fa-sitemap", url: "referensi/alur-tujuan-pembelajaran.pdf", type: "pdf" },
                    { title: "Program Tahunan", icon: "fa-calendar-check", url: "referensi/program-tahunan.pdf", type: "pdf" },
                    { title: "Program Semester", icon: "fa-calendar-week", url: "referensi/program-semester.pdf", type: "pdf" },
                    { title: "RPP / Modul Ajar", icon: "fa-chalkboard-teacher", url: "referensi/modul-ajar.pdf", type: "pdf" },
                    { title: "KKTP", icon: "fa-check-double", url: "referensi/kktp.pdf", type: "pdf" },
                    { title: "Program Keagamaan", icon: "fa-mosque", url: "referensi/program-keagamaan.pdf", type: "pdf" },
                    { title: "Program Ekstrakurikuler", icon: "fa-users", url: "referensi/program-ekstrakurikuler.pdf", type: "pdf" },
                    { title: "Program Perbaikan dan Pengayaan", icon: "fa-hands-helping", url: "referensi/program-perbaikan-pengayaan.pdf", type: "pdf" }
                ]
            }];

            const sidebarElement = document.getElementById('sidebarMenu');
            const viewerElement = document.getElementById('documentViewer');
            const viewerError = document.getElementById('viewerError');
            const welcomeScreen = document.getElementById('welcomeScreen');
            const menuToggle = document.getElementById('menuToggle');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            const contentToolbar = document.getElementById('contentToolbar');
            const toolbarTitleText = document.getElementById('toolbarTitleText');
            const toolbarIcon = document.getElementById('toolbarIcon');
            const btnOpenNewTab = document.getElementById('btnOpenNewTab');
            const btnFullscreen = document.getElementById('btnFullscreen');
            let activeItemElement = null;
            let currentUrl = '';

            async function checkFileExists(url) {
                try {
                    const response = await fetch(url, { method: 'HEAD', cache: 'no-cache' });
                    return response.ok;
                } catch (error) {
                    return false;
                }
            }

async function showViewer(item) {
    welcomeScreen.style.display = 'none';
    viewerElement.style.display = 'none';
    viewerError.classList.remove('visible');
    contentToolbar.classList.remove('visible');
    currentUrl = '';

    toolbarTitleText.textContent = item.title;
    toolbarIcon.className = 'fa-solid ' + (item.type === 'pdf' ? 'fa-file-pdf' : 'fa-person-chalkboard');

    // Jika PDF, gunakan viewer khusus
    let finalUrl = item.url;
    if (item.type === 'pdf') {
        finalUrl = 'pdf-viewer.html?file=' + encodeURIComponent(item.url);
    }

    const exists = await checkFileExists(item.url);
    if (!exists) {
        viewerError.querySelector('.msg-text').textContent = 'File tidak ditemukan: ' + item.url;
        viewerError.classList.add('visible');
        contentToolbar.classList.add('visible');
        currentUrl = '';
        return;
    }

    currentUrl = finalUrl;
    contentToolbar.classList.add('visible');
    viewerElement.src = finalUrl;
    viewerElement.style.display = 'block';
}

            function renderSidebar() {
                const logoArea = sidebarElement.querySelector('.sidebar-logo-area');
                sidebarElement.innerHTML = '';
                if (logoArea) {
                    sidebarElement.appendChild(logoArea);
                } else {
                    const newLogoArea = document.createElement('div');
                    newLogoArea.className = 'sidebar-logo-area';
                    newLogoArea.innerHTML = '<i class="fa-solid fa-book-open-reader"></i><span>Menu Navigasi</span>';
                    sidebarElement.appendChild(newLogoArea);
                }

                menuData.forEach((section) => {
                    const categoryTitle = document.createElement('div');
                    categoryTitle.className = 'category-title';
                    categoryTitle.textContent = section.category;
                    sidebarElement.appendChild(categoryTitle);

                    section.items.forEach((item) => {
                        const menuItem = document.createElement('div');
                        menuItem.className = 'nav-item';
                        menuItem.innerHTML = `<i class="fa-solid ${item.icon}"></i> <span>${item.title}</span>`;
                        menuItem.setAttribute('role', 'button');
                        menuItem.setAttribute('tabindex', '0');
                        menuItem.setAttribute('aria-label', `Buka ${item.title}`);

                        menuItem.addEventListener('click', () => {
                            if (activeItemElement) activeItemElement.classList.remove('active');
                            menuItem.classList.add('active');
                            activeItemElement = menuItem;
                            showViewer(item);
                            closeSidebar();
                        });

                        menuItem.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter' || e.key === ' ') {
                                e.preventDefault();
                                menuItem.click();
                            }
                        });

                        sidebarElement.appendChild(menuItem);
                    });
                });

                viewerElement.style.display = 'none';
                welcomeScreen.style.display = 'flex';
            }

            function openSidebar() {
                sidebarElement.classList.add('open');
                sidebarOverlay.classList.add('visible');
                document.body.style.overflow = 'hidden';
                setTimeout(() => {
                    const focusTarget = sidebarElement.querySelector('.nav-item.active') || sidebarElement.querySelector('.nav-item');
                    if (focusTarget) focusTarget.focus();
                }, 150);
            }

            function closeSidebar() {
                sidebarElement.classList.remove('open');
                sidebarOverlay.classList.remove('visible');
                document.body.style.overflow = '';
                if (menuToggle) menuToggle.focus();
            }

            function toggleSidebar() {
                if (sidebarElement.classList.contains('open')) {
                    closeSidebar();
                } else {
                    openSidebar();
                }
            }

            btnOpenNewTab.addEventListener('click', () => {
                if (currentUrl) window.open(currentUrl, '_blank');
            });

            btnFullscreen.addEventListener('click', () => {
                if (!currentUrl) return;
                const el = viewerElement;
                const request = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
                if (request) {
                    request.call(el).catch(() => {
                        window.open(currentUrl, '_blank');
                    });
                } else {
                    window.open(currentUrl, '_blank');
                }
            });

            menuToggle.addEventListener('click', toggleSidebar);
            sidebarOverlay.addEventListener('click', closeSidebar);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && sidebarElement.classList.contains('open')) {
                    closeSidebar();
                }
            });
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768 && sidebarElement.classList.contains('open')) {
                    closeSidebar();
                }
            });

            renderSidebar();
        })();
    </script>
</body>
</html>
